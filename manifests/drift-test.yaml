---
# Drift test — pod that writes and executes a binary after start
# Triggers ContainerDrift detection
apiVersion: v1
kind: Pod
metadata:
  name: drift-test
  namespace: falcon-detections
  labels:
    app: drift-test
    purpose: drift-testing
    sensor.falcon-system.crowdstrike.com/injection: enabled
spec:
  restartPolicy: Never
  initContainers:
    - name: setup
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          # Write a new binary into the shared volume
          cp /bin/wget /shared/drifted-binary
          chmod +x /shared/drifted-binary
      volumeMounts:
        - name: shared
          mountPath: /shared
  containers:
    - name: main
      image: python:3.11-slim
      command:
        - /bin/bash
        - -c
        - |
          echo "=== Container Drift Test ==="
          # Execute the binary that wasn't in the original image
          /shared/drifted-binary --help 2>/dev/null || true
          # Also create and execute a new binary in-place
          cp /bin/ls /tmp/new-binary
          chmod +x /tmp/new-binary
          /tmp/new-binary /
          echo "=== Drift test complete ==="
          sleep 30
      volumeMounts:
        - name: shared
          mountPath: /shared
      securityContext:
        runAsUser: 0
  volumes:
    - name: shared
      emptyDir: {}
